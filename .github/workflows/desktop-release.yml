name: Build desktop installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  LIVEKIT_VERSION: "1.8.0"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            livekit_asset: livekit_${{ vars.LIVEKIT_VERSION || '1.8.0' }}_darwin_arm64.tar.gz
            tauri_target_flag: --target aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
            livekit_asset: livekit_${{ vars.LIVEKIT_VERSION || '1.8.0' }}_darwin_amd64.tar.gz
            tauri_target_flag: --target x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            livekit_asset: livekit_${{ vars.LIVEKIT_VERSION || '1.8.0' }}_linux_amd64.tar.gz
            tauri_target_flag: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            livekit_asset: livekit_${{ vars.LIVEKIT_VERSION || '1.8.0' }}_windows_amd64.tar.gz
            tauri_target_flag: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            desktop/src-tauri

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Build accordserver
        shell: bash
        run: |
          cargo build --release --bin accordserver --target ${{ matrix.target }}

      - name: Download LiveKit server
        shell: bash
        env:
          LIVEKIT_VERSION: ${{ env.LIVEKIT_VERSION }}
          ASSET: ${{ matrix.livekit_asset }}
        run: |
          set -euo pipefail
          mkdir -p livekit-dl
          curl -fsSL -o livekit-dl/livekit.tar.gz \
            "https://github.com/livekit/livekit/releases/download/v${LIVEKIT_VERSION}/${ASSET}"
          tar -xzf livekit-dl/livekit.tar.gz -C livekit-dl

      - name: Stage sidecar binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop/src-tauri/binaries

          case "${{ matrix.target }}" in
            *windows*)
              cp "target/${{ matrix.target }}/release/accordserver.exe" \
                 "desktop/src-tauri/binaries/accordserver-${{ matrix.target }}.exe"
              cp livekit-dl/livekit-server.exe \
                 "desktop/src-tauri/binaries/livekit-server-${{ matrix.target }}.exe"
              ;;
            *)
              cp "target/${{ matrix.target }}/release/accordserver" \
                 "desktop/src-tauri/binaries/accordserver-${{ matrix.target }}"
              cp livekit-dl/livekit-server \
                 "desktop/src-tauri/binaries/livekit-server-${{ matrix.target }}"
              chmod +x \
                "desktop/src-tauri/binaries/accordserver-${{ matrix.target }}" \
                "desktop/src-tauri/binaries/livekit-server-${{ matrix.target }}"
              ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Tauri CLI
        working-directory: desktop
        run: |
          pnpm init -y || true
          pnpm add -D @tauri-apps/cli

      - name: Regenerate full icon set from canonical icon.png
        working-directory: desktop
        run: |
          pnpm tauri icon src-tauri/icons/icon.png

      - name: Build installer
        working-directory: desktop
        shell: bash
        run: |
          pnpm tauri build ${{ matrix.tauri_target_flag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: accord-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: warn

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.AppImage
          fail_on_unmatched_files: false
